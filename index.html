<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyathnic | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; /* Keeps glitter inside the screen */
            background-color: #050505;
        }

        .main-container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative; /* Base for glitter */
            z-index: 1;
        }

        /* Responsive Background Images */
        @media (max-width: 1024px) {
            .main-container {
                background-image: url('Gemini_Generated_Image_cl3zqwcl3zqwcl3z.png');
            }
        }

        @media (min-width: 1025px) {
            .main-container {
                background-image: url('Gemini_Generated_Image_o8vwzao8vwzao8vw.png');
            }
        }

        /* Glitter Particle Styling */
        .glitter {
            position: absolute;
            background: radial-gradient(circle, #fff700 0%, #d4af37 100%);
            border-radius: 50%;
            pointer-events: none; /* Allows clicking through the glitter */
            box-shadow: 0 0 5px #fff700;
            z-index: 2;
        }

        /* Bottom Row Styling */
        .contact-row {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            padding: 0 20px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 10; /* Ensures buttons stay clickable above glitter */
        }

        .gold-box {
            background: rgba(212, 175, 55, 0.15); 
            border: 1px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .gold-box i {
            color: #d4af37;
            font-size: 1.2rem;
        }

        .gold-box:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.9);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
        }

        @media (max-width: 650px) {
            .contact-row {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-bottom: 40px;
            }
            .gold-box {
                width: 85%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-container" id="container">
        
        <div class="contact-row">
            <a href="tel:+916289388029" class="gold-box">
                <i class="fab fa-whatsapp"></i>
                <span>+91 - 6289388029</span>
            </a>

            <a href="mailto:soulstich.store@gmail.com" class="gold-box">
                <i class="far fa-envelope"></i>
                <span>soulstich.store@gmail.com</span>
            </a>
        </div>

    </div>

    <script>
        function createGlitter() {
            const container = document.getElementById('container');
            const glitter = document.createElement('div');
            
            // Randomize starting position, size, and duration
            const size = Math.random() * 4 + 1 + 'px';
            const left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 4 + 's'; // Between 4s and 7s
            const delay = Math.random() * 5 + 's';

            glitter.classList.add('glitter');
            glitter.style.width = size;
            glitter.style.height = size;
            glitter.style.left = left;
            glitter.style.top = '-10px';
            glitter.style.opacity = Math.random();
            
            // Apply animation via JS
            glitter.animate([
                { transform: 'translateY(0vh) rotate(0deg)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: parseFloat(duration) * 1000,
                easing: 'linear',
                iterations: 1
            });

            container.appendChild(glitter);

            // Remove the element after animation ends to keep performance high
            setTimeout(() => {
                glitter.remove();
            }, parseFloat(duration) * 1000);
        }

        // Create a new glitter particle every 150ms
        setInterval(createGlitter, 150);
    </script>

</body>
</html>
